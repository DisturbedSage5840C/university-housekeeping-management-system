services:
  # ──────── PostgreSQL ────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-ilgc_tracker}
      POSTGRES_USER: ${DB_USER:-ilgc_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ilgc_admin} -d ${DB_NAME:-ilgc_tracker}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────── Redis ────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────── Node.js API ────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-ilgc_tracker}
      DB_USER: ${DB_USER:-ilgc_admin}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?Set JWT_REFRESH_SECRET}
      AI_SERVICE_URL: http://ai-service:8000
      AI_SERVICE_API_KEY: ${AI_SERVICE_API_KEY:-internal-key}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      UPLOAD_DIR: /app/uploads
      OTP_TEST_MODE: ${OTP_TEST_MODE:-false}
      SMS_PROVIDER: ${SMS_PROVIDER:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
      FAST2SMS_API_KEY: ${FAST2SMS_API_KEY:-}
      TEXTBELT_KEY: ${TEXTBELT_KEY:-}
    volumes:
      - uploads:/app/uploads
      - api_logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────── Python AI/ML Service ────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      API_KEY: ${AI_SERVICE_API_KEY:-internal-key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-changeme}@redis:6379/1
      LOG_LEVEL: INFO
      MODEL_DIR: /app/models
    volumes:
      - ai_models:/app/models
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; r = httpx.get('http://127.0.0.1:8000/health'); exit(0 if r.status_code == 200 else 1)\""]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

  # ──────── Nginx Reverse Proxy ────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - uploads:/app/uploads:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ──────── Certbot (SSL) ────────
  certbot:
    image: certbot/certbot
    depends_on:
      - nginx
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

volumes:
  pgdata:
  redisdata:
  uploads:
  api_logs:
  ai_models:
  certbot_conf:
  certbot_www:
